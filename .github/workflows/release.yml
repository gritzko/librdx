name: Release

on:
  push:
    tags: ['v*']

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get -y install ninja-build libsodium-dev \
          libcurl4-gnutls-dev librocksdb-dev liblz4-dev
    - name: Configure
      run: >
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        -DCMAKE_C_COMPILER=clang -GNinja
    - name: Build
      run: ninja -C build be/be capo/capo
    - name: Strip
      run: strip build/be/be build/capo/capo
    - name: Package
      run: tar czf librdx-linux-x86_64.tar.gz -C build be/be capo/capo
    - uses: actions/upload-artifact@v4
      with:
        name: librdx-linux-x86_64
        path: librdx-linux-x86_64.tar.gz

  macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: brew install ninja
    - name: Configure
      run: >
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        -DWITH_ROCKS=OFF -GNinja
    - name: Build
      run: ninja -C build capo/capo
    - name: Strip
      run: strip build/capo/capo
    - name: Package
      run: tar czf librdx-macos-arm64.tar.gz -C build capo/capo
    - uses: actions/upload-artifact@v4
      with:
        name: librdx-macos-arm64
        path: librdx-macos-arm64.tar.gz

  release:
    needs: [linux, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Source tarball
      run: git archive --format=tar.gz --prefix=librdx/ HEAD > librdx-src.tar.gz
    - uses: actions/download-artifact@v4
    - uses: softprops/action-gh-release@v2
      with:
        files: |
          librdx-src.tar.gz
          librdx-linux-x86_64/librdx-linux-x86_64.tar.gz
          librdx-macos-arm64/librdx-macos-arm64.tar.gz
